<svg xmlns="http://www.w3.org/2000/svg" width="1024" height="1024" viewBox="0 0 1024 1024">
  <!-- macOS icon grid: the tile is 824x824 centered in the 1024 canvas
       (100px transparent margin all around), corner radius ~185. Drawing
       the tile full-bleed makes the icon render oversized next to every
       other app in the Dock — macOS does not add the margin for you. -->
  <rect x="100" y="100" width="824" height="824" rx="185" ry="185" fill="#0d0f14"/>
  <circle
    cx="512" cy="512" r="242"
    fill="none" stroke="#ffffff" stroke-width="50" stroke-linecap="round"
    stroke-dasharray="1310 210"
    transform="rotate(0 512 512)"
  />
  <circle cx="731" cy="410" r="63" fill="#ffffff"/>
</svg>
