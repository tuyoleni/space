name: release

# Builds unsigned macOS zips for both architectures and attaches them to a
# GitHub Release whenever a version tag is pushed. No code signing yet —
# add `osxSign`/`osxNotarize` to apps/desktop/forge.config.ts once there's
# an Apple Developer ID cert, then this workflow needs no changes (electron-
# forge picks it up automatically).
#
# Both arch builds run on the same macos-14 (Apple Silicon) runner — GitHub
# no longer offers Intel-hosted macOS runners, so the x64 build is
# cross-packaged: electron-forge's afterCopy hook (forge.config.ts) rebuilds
# the app's native modules (better-sqlite3, node-pty) for the requested
# --arch by fetching that arch's prebuilt binary, not by compiling on
# mismatched host hardware.
on:
  push:
    tags:
      - 'v*.*.*'

jobs:
  build-macos:
    strategy:
      matrix:
        arch: [arm64, x64]
    runs-on: macos-14
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - run: npm ci

      - run: npm run make --workspace apps/desktop -- --arch=${{ matrix.arch }}

      - name: Rename artifact with arch suffix
        run: |
          cd apps/desktop/out/make/zip/darwin/${{ matrix.arch }}
          mv *.zip "space-darwin-${{ matrix.arch }}.zip"

      - uses: actions/upload-artifact@v4
        with:
          name: space-darwin-${{ matrix.arch }}
          path: apps/desktop/out/make/zip/darwin/${{ matrix.arch }}/space-darwin-${{ matrix.arch }}.zip

  release:
    needs: build-macos
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: artifacts
          merge-multiple: true

      - uses: softprops/action-gh-release@v2
        with:
          files: artifacts/*.zip
          generate_release_notes: true
